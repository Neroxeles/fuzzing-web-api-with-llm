general:
  name: "promptV4-oasV5" # <---
  output-dir: "/content/fuzzing-web-api-with-llm/output"
  oas-file: "/content/fuzzing-web-api-with-llm/OAS/swagger_v05.yml" # <---

model:
  checkpoint: "deepseek-ai/deepseek-coder-33b-base"
  cache-dir: "/content/drive/MyDrive/models"
  device: "cuda"
  device-map: "/content/fuzzing-web-api-with-llm/configs/device-maps/gpu-only.json"
  load-in: "4bit"
  offload-folder: "offload"
  batch-size: 1
  do-sample: true
  num-beams: 
  num-beam-groups: 
  penalty-alpha: 
  diversity-penalty: 
  temperature: 1.0
  top-k: 
  top-p: 0.95
  max-new-tokens: 1024
  eos:
    - "<｜end▁of▁sentence｜>"
    - "```"
  min-tokens: 20
  min-characters: 40
  max-retries: 4
  add-missing-imports: true

phase-i:
  execute: false
  oas-checksum: ""
  base-url: "https://generator3.swagger.io/api/"
  verify: false

phase-ii:
  execute: true
  template: "/content/fuzzing-web-api-with-llm/templates/prompt_v04.md" # <---
  loops: 5

phase-iii:
  execute: true
  range: 1000