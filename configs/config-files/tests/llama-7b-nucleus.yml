general:
  name: "promptV1-oasV1" # <---
  output-dir: "/content/fuzzing-web-api-with-llm/output"
  oas-file: "/content/fuzzing-web-api-with-llm/OAS/swagger_v01.yml" # <---

model:
  checkpoint: "codellama/CodeLlama-7b-Python-hf"
  cache-dir: "/content/drive/MyDrive/models"
  device: "cuda"
  device-map: "/content/fuzzing-web-api-with-llm/configs/device-maps/gpu-only.json"
  load-in: "bfloat16"
  offload-folder: "offload"
  batch-size: 1
  do-sample: true
  num-beams: 1
  num-beam-groups: 1
  penalty-alpha: 
  diversity-penalty: 0.0
  temperature: 1.0
  top-k: 50
  top-p: 0.95
  max-new-tokens: 1024
  eos:
    - "<|endoftext|>"
    # - "```"
  min-tokens: 0 #20
  min-characters: 0 #40
  max-retries: 4
  add-missing-imports: false

phase-i:
  execute: false
  oas-checksum: ""
  base-url: "https://generator3.swagger.io/api/"
  verify: false

phase-ii:
  execute: true
  template: "/content/fuzzing-web-api-with-llm/templates/prompt_v01.md" # <---
  loops: 5