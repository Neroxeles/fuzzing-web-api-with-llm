general:
  name: "promptV2-oasV2" # <---
  output-dir: "/content/fuzzing-web-api-with-llm/output"
  oas-file: "/content/fuzzing-web-api-with-llm/OAS/swagger_v01.yml" # <---

model:
  checkpoint: "bigcode/starcoder2-15b"
  cache-dir: "/content/drive/MyDrive/models"
  device: "cuda"
  device-map: "/content/fuzzing-web-api-with-llm/configs/device-maps/gpu-only.json"
  load-in: "bfloat16"
  offload-folder: "offload"
  batch-size: 1
  do-sample: false
  num-beams: 
  num-beam-groups: 
  penalty-alpha: 
  diversity-penalty: 
  temperature: 
  top-k: 
  top-p: 
  max-new-tokens: 1024
  eos:
    - "<|endoftext|>"
    - "```"
  min-tokens: 0 #20
  min-characters: 0 #40
  max-retries: 0
  add-missing-imports: true

phase-i:
  execute: false
  oas-checksum: ""
  base-url: "https://generator3.swagger.io/api/"
  verify: false

phase-ii:
  execute: true
  template: "/content/fuzzing-web-api-with-llm/templates/prompt_v01.md" # <---
  loops: 1