general:
  name: "promptV3-oasV3" # <---
  output-dir: "/content/fuzzing-web-api-with-llm/output"
  oas-file: "/content/fuzzing-web-api-with-llm/OAS/swagger_v03.yml" # <---

model:
  checkpoint: "codellama/CodeLlama-34b-Python-hf"
  cache-dir: "/content/drive/MyDrive/models"
  device: "cuda"
  device-map: "/content/fuzzing-web-api-with-llm/configs/device-maps/gpu-only.json"
  load-in: "8bit"
  offload-folder: "offload"
  batch-size: 1
  do-sample: 
  num-beams: 
  num-beam-groups: 
  penalty-alpha: 0.6
  diversity-penalty: 
  temperature: 
  top-k: 5
  top-p: 
  max-new-tokens: 1024
  eos:
    - "<|endoftext|>"
    - "```"
  min-tokens: 20
  min-characters: 40
  max-retries: 0
  add-missing-imports: true

phase-i:
  execute: false
  oas-checksum: ""
  base-url: "https://generator3.swagger.io/api/"
  verify: false

phase-ii:
  execute: true
  template: "/content/fuzzing-web-api-with-llm/templates/prompt_v03.md" # <---
  loops: 1